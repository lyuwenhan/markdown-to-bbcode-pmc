name: Publish npm Package

on:
  push:
    branches:
      - main
    paths:
      - "status.json"
      - "package.json"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Check status.json
        id: status
        run: |
          node script/index.js >> $GITHUB_OUTPUT

      - name: Install dependencies
        if: steps.status.outputs.needs_update == 'true'
        run: npm ci

      - name: Test
        if: steps.status.outputs.needs_update == 'true'
        run: npm test --if-present

      - name: Check package contents
        if: steps.status.outputs.needs_update == 'true'
        run: npm publish --dry-run

      - name: Publish to npm
        if: steps.status.outputs.needs_update == 'true'
        run: npm publish --provenance

      - name: Skip publish
        if: steps.status.outputs.needs_update != 'true'
        run: echo "status.json says needsUpdate=false, skipping publish."
